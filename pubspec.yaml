name: agro365
description: "A new Flutter project."
publish_to: 'none' 


version: 1.1.0+7

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  webview_flutter: ^4.5.0
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  device_info_plus: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:

  uses-material-design: true

  assets:
    - assets/logo/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/agro365.jpg"
  min_sdk_android: 21

